<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ved Logistics — Dashboard</title>
<meta name="description" content="Ved Logistics Employee & Rider Management Dashboard">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css?v=4">
</head>
<body>

<div class="app-layout" id="app">
  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="logo.jpg" alt="Ved Logistics">
      <div class="sidebar-brand-text">
        Ved Logistics
        <small>Management Portal</small>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebarNav">
      <!-- Populated by JS based on role -->
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebarUser">
        <div class="sidebar-user-avatar" id="userAvatar"></div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="userName"></div>
          <div class="sidebar-user-role" id="userRole"></div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-area">
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-hamburger" id="menuToggle">☰</button>
        <div class="topbar-breadcrumb" id="breadcrumb">
          <strong>Dashboard</strong>
        </div>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn dark-toggle" id="darkToggle" title="Toggle Dark Mode">🌙</button>
        <button class="topbar-btn" title="Notifications" id="notifBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-dot"></span>
        </button>
        <button class="btn-outline btn-sm" id="logoutBtn" style="gap:6px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </header>

    <!-- Content Area -->
    <main class="content" id="content">
      <!-- Pages rendered here by JS -->
    </main>
  </div>
</div>

<!-- Scripts (order matters: utils → store → seed → auth → feature modules → dashboard) -->
<script src="js/utils.js?v=4"></script>
<script src="js/store.js?v=4"></script>
<script src="js/seed.js?v=4"></script>
<script src="js/auth.js?v=4"></script>
<script src="js/employees.js?v=4"></script>
<script src="js/riders.js?v=4"></script>
<script src="js/attendance.js?v=4"></script>
<script src="js/parcels.js?v=4"></script>
<script src="js/salary.js?v=4"></script>
<script src="js/expenses.js?v=4"></script>
<script src="js/reports.js?v=4"></script>
<script src="js/dashboard.js?v=4"></script>
</body>
</html>
